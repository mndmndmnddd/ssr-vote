<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you for your vote 🍣</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:     #FFB7C5;
    --pink-lt:  #FFE4EC;
    --pink-dk:  #F28BA0;
    --mint:     #B5EAD7;
    --mint-lt:  #DFF7EE;
    --peach:    #FFDAC1;
    --lavender: #C9C1F5;
    --lav-dk:   #9B8FE8;
    --cream:    #FFF9F0;
    --text:     #5C4A6E;
    --text-lt:  #9B8AB0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans Thai', 'Quicksand', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  .belt { position: fixed; left: 0; right: 0; z-index: 1; }
  .belt-bar {
    height: 44px;
    background: linear-gradient(90deg, var(--pink) 0%, var(--peach) 33%, var(--mint) 66%, var(--lavender) 100%);
    opacity: .5;
  }
  .belt.top .belt-bar { border-radius: 0 0 20px 20px; }
  .belt.bottom .belt-bar { border-radius: 20px 20px 0 0; }
  .belt.top { top: 0; }
  .belt.bottom { bottom: 0; }
  .belt-rail {
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.7) 0px, rgba(255,255,255,.7) 16px,
      transparent 16px, transparent 24px
    );
    margin-top: -24px;
  }
  .belt.bottom .belt-rail { margin-top: 16px; }

  .bubble {
    position: fixed; border-radius: 50%; opacity: .15;
    pointer-events: none; z-index: 0;
    animation: drift ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-20px) scale(1.05); }
  }

  .floaters { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
  .floater {
    position: absolute;
    animation: glide linear infinite;
    opacity: 0;
    user-select: none;
  }
  @keyframes glide {
    0%   { transform: translateX(-80px); opacity: 0; }
    8%   { opacity: .6; }
    92%  { opacity: .6; }
    100% { transform: translateX(calc(100vw + 80px)); opacity: 0; }
  }

  .card {
    position: relative; z-index: 10;
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(16px);
    border-radius: 32px;
    padding: 48px 40px 44px;
    max-width: 400px; width: 90%;
    box-shadow:
      0 12px 40px rgba(200,150,190,.2),
      0 2px 8px rgba(200,150,190,.1),
      inset 0 1px 0 rgba(255,255,255,.95);
    text-align: center;
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.7) translateY(40px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .icon-wrap {
    width: 100px; height: 100px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.2rem;
    margin: 0 auto 22px;
    animation: wobble 2.6s ease-in-out infinite;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(-5deg) scale(1); }
    50%      { transform: rotate(5deg) scale(1.06); }
  }

  /* LOADING */
  .loading .icon-wrap { background: linear-gradient(135deg, var(--pink-lt), var(--mint-lt)); border: 3px solid var(--pink); }
  .loading .badge     { background: var(--pink-lt); color: var(--pink-dk); }

  /* SUCCESS */
  .success .icon-wrap { background: linear-gradient(135deg, var(--mint-lt), var(--pink-lt)); border: 3px solid var(--mint); }
  .success .badge     { background: linear-gradient(135deg, var(--mint), #7BDCB5); color: #1E6B4F; }

  /* DUPLICATE */
  .duplicate .icon-wrap { background: linear-gradient(135deg, var(--peach), var(--lavender)); border: 3px solid var(--lavender); }
  .duplicate .badge     { background: linear-gradient(135deg, var(--lavender), var(--lav-dk)); color: #3D2E8A; }

  .badge {
    display: inline-block;
    padding: 5px 18px; border-radius: 99px;
    font-size: .76rem; font-weight: 700; letter-spacing: .05em;
    margin-bottom: 18px;
  }
  .title {
    font-size: 1.5rem; font-weight: 700;
    color: var(--text); line-height: 1.3; margin-bottom: 10px;
  }
  .subtitle {
    color: var(--text-lt); font-size: .93rem;
    line-height: 1.7; margin-bottom: 18px;
  }
  .table-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--lavender); color: #3D2E8A;
    border-radius: 99px; padding: 4px 16px;
    font-size: .82rem; font-weight: 700; margin-bottom: 18px;
  }
  .coupon {
    background: linear-gradient(135deg, var(--peach), var(--pink-lt));
    border: 2px dashed var(--pink-dk);
    border-radius: 18px; padding: 18px 24px; margin: 0 auto;
  }
  .coupon-label {
    font-size: .7rem; font-weight: 700; letter-spacing: .12em;
    color: var(--pink-dk); text-transform: uppercase; margin-bottom: 4px;
  }
  .coupon-amount { font-size: 2.8rem; font-weight: 700; color: #C4516A; line-height: 1; }
  .coupon-unit   { font-size: .9rem; font-weight: 700; color: #C4516A; }
  .coupon-note   { font-size: .78rem; color: #9B5F6B; margin-top: 6px; line-height: 1.5; }
  .divider       { border: none; border-top: 2px dashed rgba(200,150,190,.25); margin: 18px 0; }

  /* Spinner */
  .spinner {
    width: 40px; height: 40px; margin: 8px auto 0;
    border: 4px solid var(--pink-lt);
    border-top-color: var(--pink-dk);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    position: fixed; bottom: 54px; left: 0; right: 0;
    text-align: center; z-index: 10;
    font-size: .7rem; color: var(--text-lt); letter-spacing: .06em;
  }
</style>
</head>
<body>

<!-- Belts -->
<div class="belt top"><div class="belt-bar"></div><div class="belt-rail"></div></div>
<div class="belt bottom"><div class="belt-rail"></div><div class="belt-bar"></div></div>

<!-- Bubbles -->
<div class="bubble" style="width:200px;height:200px;background:var(--pink);top:-70px;left:-50px;animation-duration:5s;"></div>
<div class="bubble" style="width:150px;height:150px;background:var(--mint);bottom:50px;right:-30px;animation-duration:6s;animation-delay:-2s;"></div>
<div class="bubble" style="width:110px;height:110px;background:var(--peach);top:38%;left:4%;animation-duration:7s;animation-delay:-1s;"></div>
<div class="bubble" style="width:80px;height:80px;background:var(--lavender);top:18%;right:6%;animation-duration:4.5s;"></div>

<!-- Floating sushi -->
<div class="floaters" id="floaters"></div>

<!-- Card — จะถูก render โดย JavaScript -->
<div class="card loading" id="card">
  <div class="icon-wrap">🍣</div>
  <span class="badge">กำลังตรวจสอบ...</span>
  <div class="title">โปรดรอสักครู่</div>
  <div class="subtitle">กำลังบันทึกการโหวตของคุณ</div>
  <div class="spinner"></div>
</div>

<footer>🍱 Thank you for dining with us 🍱</footer>

<script>
// ═══════════════════════════════════════════════
//  ⚠️  แก้ค่านี้ค่าเดียว — ใส่ GAS URL ของคุณ
// ═══════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbznP-A_sIDGh_4Z_5KODzvwvf1eVcKXyDMiEz25-cRN13qgXC4X_C3gLklhWQ0gCyM/exec";

// ── Floating sushi ──────────────────────────────
const EMOJIS = ["🍣","🍱","🦐","🥢","🍙","🍤","🐟","🥑","🍚","🫙","🍘"];
const wrap   = document.getElementById("floaters");
function spawnFloater() {
  const el = document.createElement("span");
  el.className   = "floater";
  el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  el.style.fontSize = (1.3 + Math.random() * .9) + "rem";
  el.style.top = ["6%","50%","88%"][Math.floor(Math.random() * 3)];
  const dur = 7 + Math.random() * 8;
  el.style.animationDuration = dur + "s";
  el.style.animationDelay    = (-Math.random() * dur) + "s";
  wrap.appendChild(el);
  setTimeout(() => el.remove(), (dur + 2) * 1000);
}
for (let i = 0; i < 14; i++) spawnFloater();
setInterval(spawnFloater, 1600);

// ── Render card ─────────────────────────────────
function showSuccess(tableNo) {
  document.getElementById("card").className = "card success";
  document.getElementById("card").innerHTML = `
    <div class="icon-wrap">🎉</div>
    <span class="badge">Success ✓</span>
    <div class="title">ขอบคุณสำหรับการโหวต!</div>
    <div class="subtitle">Thank you for your vote</div>
    <div class="table-chip">🪑 Table no. <strong>${tableNo}</strong></div>
    <hr class="divider">
    <div class="coupon">
      <div class="coupon-label">🎁 Discount coupon</div>
      <div class="coupon-amount">20 <span class="coupon-unit">THB</span></div>
      <div class="coupon-note">โปรดแสดงหน้าจอนี้ให้กับพนักงานเพื่อรับคูปอง<br>Please show this screen to the staff to receive your coupon.</div>
    </div>`;
}

function showDuplicate(tableNo) {
  document.getElementById("card").className = "card duplicate";
  document.getElementById("card").innerHTML = `
    <div class="icon-wrap">⏰</div>
    <span class="badge">Duplicated</span>
    <div class="title">หมายเลขโต๊ะนี้มีการโหวตแล้วในช่วงเวลาเดียวกัน</div>
    <div class="subtitle">This table has already voted during the same time period.</div>
    <div class="table-chip">🪑 Table no. <strong>${tableNo}</strong></div>`;
}

// ── Main: รับ params → เรียก GAS API ───────────
const params       = new URLSearchParams(window.location.search);
const submissionId = params.get("submissionId") || "";
const tableNo      = params.get("tableNo")      || "?";

(async () => {
  try {
    const url = new URL(GAS_URL);
    url.searchParams.set("submissionId", submissionId);
    url.searchParams.set("tableNo",      tableNo);

    // GAS ต้อง return JSON: { duplicate: true/false, tableNo: "..." }
    const res  = await fetch(url.toString());
    const data = await res.json();

    if (data.duplicate) {
      showDuplicate(data.tableNo || tableNo);
    } else {
      showSuccess(data.tableNo || tableNo);
    }
  } catch (err) {
    // ถ้า API ล้มเหลว ใช้ tableNo จาก URL แสดงผลไปก่อน
    console.error(err);
    showSuccess(tableNo);
  }
})();
</script>
</body>
</html>
